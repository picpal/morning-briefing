name: Morning Briefing

on:
  schedule:
    # 매일 오전 7시 30분 KST (22:30 UTC 전날)
    - cron: '30 22 * * *'
  workflow_dispatch:  # 수동 실행 지원

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing pipeline
        id: briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_TTS_KEY_JSON: ${{ secrets.GOOGLE_TTS_KEY_JSON }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TTS_VOICE: "ko-KR-Chirp3-HD-Achernar"
          CLAUDE_MODEL: "claude-sonnet-4-20250514"
        run: python main.py

      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: briefing-audio-${{ steps.briefing.outputs.briefing_date }}
          path: output/briefing-*.mp3
          retention-days: 30

      - name: Upload markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: briefing-markdown-${{ steps.briefing.outputs.briefing_date }}
          path: output/briefing-*.md
          retention-days: 30

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ || true
          git diff --staged --quiet || git commit -m "📋 Daily briefing ${{ steps.briefing.outputs.briefing_date }}"
          git push || true
